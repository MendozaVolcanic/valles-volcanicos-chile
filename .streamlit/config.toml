[theme]
base = "dark"
primaryColor = "#ff6b35"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#161b22"
textColor = "#e0e0e0"
font = "sans serif"

[server]
headless = true
# port: sin definir aqui, Streamlit Cloud usa 8501 por defecto
# Para correr local en puerto diferente: streamlit run app/dashboard.py --server.port 8505

[browser]
gatherUsageStats = false
