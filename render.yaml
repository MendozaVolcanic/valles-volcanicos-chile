services:
  - type: web
    name: valles-volcanicos-chile
    runtime: python
    pythonVersion: "3.12.9"
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app/dashboard.py --server.port $PORT --server.headless true --server.address 0.0.0.0
    plan: free
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
